<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" role="img" aria-label="DigiFund silicon wafer">
  <defs>
    <linearGradient id="wf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f7fe"/>
      <stop offset=".4" stop-color="#cfdbf1"/>
      <stop offset=".72" stop-color="#a7bde1"/>
      <stop offset="1" stop-color="#7f98c8"/>
    </linearGradient>
    <radialGradient id="wsheen" cx=".34" cy=".27" r=".85">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
      <stop offset=".45" stop-color="#ffffff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wchev" x1="0" y1="0" x2="1" y2=".55">
      <stop offset="0" stop-color="#0a1a3c"/>
      <stop offset=".55" stop-color="#1e54c8"/>
      <stop offset="1" stop-color="#3b8cf7"/>
    </linearGradient>
    <linearGradient id="wrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset="1" stop-color="#5f78ab" stop-opacity=".5"/>
    </linearGradient>
  </defs>

  <!-- bóng đổ mềm -->
  <ellipse cx="180" cy="332" rx="118" ry="14" fill="#0b1b3a" opacity=".10"/>

  <!-- đĩa wafer -->
  <circle cx="180" cy="172" r="150" fill="url(#wf)" stroke="url(#wrim)" stroke-width="3"/>

  <!-- vòng phản chiếu mờ -->
  <circle cx="180" cy="172" r="121" fill="none" stroke="#ffffff" stroke-opacity=".18" stroke-width="1.5"/>
  <circle cx="180" cy="172" r="84" fill="none" stroke="#ffffff" stroke-opacity=".13" stroke-width="1.5"/>

  <!-- ánh sáng -->
  <circle cx="180" cy="172" r="150" fill="url(#wsheen)"/>

  <!-- chevron DigiFund -->
  <g transform="translate(131,104)">
    <path d="M0 0 L34 30 L0 60 L21 60 L55 30 L21 0 Z" fill="url(#wchev)"/>
    <path d="M34 0 L68 30 L34 60 L55 60 L89 30 L55 0 Z" fill="url(#wchev)" opacity=".9"/>
  </g>

  <!-- wordmark -->
  <text x="180" y="214" text-anchor="middle" font-family="'Titillium Web','Archivo',Arial,sans-serif" font-weight="700" font-size="42" letter-spacing="-1.5">
    <tspan fill="#0a1a3c">digi</tspan><tspan fill="#2f7df6">fund</tspan>
  </text>
</svg>
