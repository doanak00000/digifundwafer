<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Tiết Sản Phẩm - Digifund</title>
    <link rel="icon" type="image/png" href="./assets/images/logo-2.png">
    <link rel="apple-touch-icon" href="./assets/images/logo-2.png">
    <link href="./assets/fonts/google-archivo.css" rel="stylesheet">
    <link href="./assets/fonts/google-titillium.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --accent: #2563eb; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Titillium Web', 'Archivo', system-ui, sans-serif; color: #1d2a44; background: #fff; }
        a { text-decoration: none; }

        /* Top bar */
        .pdp-top { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 14px 5%; background: #fff; border-bottom: 1px solid #eef2f7; box-shadow: 0 2px 14px rgba(20,40,80,0.05); }
        .pdp-top__logo { display: inline-flex; align-items: center; gap: 10px; }
        .pdp-top__logo img { height: 42px; display: block; }
        .pdp-top__name { font-size: 22px; font-weight: 800; letter-spacing: 1px; color: #0b1b3a; line-height: 1; }
        [data-theme="dark"] .pdp-top__name { color: #e6edf3; }
        .pdp-top__right { display: flex; align-items: center; gap: 10px; }
        .pdp-back { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; color: #2b3650; padding: 9px 16px; border-radius: 8px; border: 1px solid #e2e8f2; transition: all .25s; }
        .pdp-back:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
        .pdp-toggle { width: 40px; height: 40px; border-radius: 8px; border: 1px solid #e2e8f2; background: #fff; color: #2b3650; font-weight: 700; font-size: 13px; cursor: pointer; transition: all .25s; }
        .pdp-toggle:hover { background: #f0f3f8; }

        /* Hero */
        .pdp-hero { position: relative; padding: 56px 5% 44px; background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #0b1b3a)); color: #fff; overflow: hidden; }
        .pdp-hero__crumb { font-size: 14px; opacity: .9; margin: 0 0 16px; }
        .pdp-hero__crumb a { color: #fff; opacity: .85; }
        .pdp-hero__crumb a:hover { opacity: 1; text-decoration: underline; }
        .pdp-hero__badge { display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; background: rgba(255,255,255,0.18); padding: 5px 14px; border-radius: 30px; margin-bottom: 14px; }
        .pdp-hero__title { font-size: 34px; font-weight: 800; margin: 0 0 12px; line-height: 1.25; max-width: 820px; }
        .pdp-hero__intro { font-size: 16px; opacity: .92; margin: 0; max-width: 720px; line-height: 1.7; }
        .pdp-hero__wafer { position: absolute; right: -60px; top: 50%; transform: translateY(-50%); width: 320px; height: 320px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.18); box-shadow: 0 0 0 40px rgba(255,255,255,0.06), 0 0 0 90px rgba(255,255,255,0.04); pointer-events: none; }

        /* Body */
        .pdp-main { max-width: 1180px; margin: 0 auto; padding: 50px 5% 70px; }
        .pd-item { margin-bottom: 46px; }
        .pd-item__head { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; padding-bottom: 12px; border-bottom: 2px solid #f0f3f8; }
        .pd-item__no { flex: none; width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: var(--accent); background: color-mix(in srgb, var(--accent) 13%, #fff); }
        .pd-item__name { font-size: 21px; font-weight: 700; color: #15233f; margin: 0; }
        .pd-variants { display: grid; grid-template-columns: repeat(auto-fill, minmax(268px, 1fr)); gap: 24px; }
        .pd-variant { position: relative; min-height: 390px; border-radius: 16px; overflow: hidden; display: flex; box-shadow: 0 8px 24px rgba(20,40,80,0.10); transition: box-shadow .25s, transform .25s; }
        .pd-variant:hover { box-shadow: 0 18px 38px rgba(20,40,80,0.20); transform: translateY(-5px); }
        .pd-variant__bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform .5s ease; }
        .pd-variant:hover .pd-variant__bg { transform: scale(1.06); }
        .pd-variant__body { position: relative; z-index: 2; margin-top: auto; padding: 30px 20px 22px; display: flex; flex-direction: column; width: 100%; color: #fff; background: linear-gradient(to top, rgba(0,0,0,0.80) 0%, rgba(0,0,0,0.62) 48%, rgba(0,0,0,0.28) 80%, rgba(0,0,0,0) 100%); }
        .pd-variant__name { font-size: 18px; font-weight: 700; color: #fff; margin: 0 0 5px; }
        .pd-variant__desc { font-size: 13.5px; color: rgba(255,255,255,0.78); margin: 0 0 14px; line-height: 1.55; }
        .pd-specs { width: 100%; border-collapse: collapse; font-size: 13.5px; margin-bottom: 16px; }
        .pd-specs th, .pd-specs td { text-align: left; padding: 7px 0; border-bottom: 1px dashed rgba(255,255,255,0.16); vertical-align: top; }
        .pd-specs th { color: rgba(255,255,255,0.6); font-weight: 600; width: 44%; white-space: nowrap; }
        .pd-specs td { color: #fff; font-weight: 600; }
        .pd-empty { padding: 12px 14px; border: 1px dashed rgba(255,255,255,0.28); border-radius: 10px; color: rgba(255,255,255,0.72); font-size: 13.5px; background: rgba(255,255,255,0.06); margin-bottom: 16px; }
        .pd-variant__btn { margin-top: auto; display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 14px; border-radius: 9px; background: var(--accent); color: #fff; font-size: 13.5px; font-weight: 600; transition: opacity .25s; }
        .pd-variant__btn:hover { opacity: .88; color: #fff; }

        /* Footer */
        .pdp-foot { padding: 30px 5%; text-align: center; background: #0d1426; color: #9aa6bd; font-size: 14px; }
        .pdp-foot a { color: #fff; font-weight: 600; }

        @media (max-width: 767px) {
            .pdp-hero__title { font-size: 26px; }
            .pdp-hero__wafer { display: none; }
            .pdp-variants { grid-template-columns: 1fr; }
        }

        /* Dark mode */
        [data-theme="dark"] body { background: #0d1117; color: #c9d1d9; }
        [data-theme="dark"] .pdp-top { background: #161b22; border-color: #21262d; }
        [data-theme="dark"] .pdp-back, [data-theme="dark"] .pdp-toggle { background: #161b22; color: #e6edf3; border-color: #30363d; }
        [data-theme="dark"] .pd-item__name { color: #e6edf3; }
        [data-theme="dark"] .pd-item__head { border-color: #21262d; }
    </style>
</head>
<body>
    <header class="pdp-top">
        <a class="pdp-top__logo" href="./index.html" aria-label="Digifund"><img src="./assets/images/logo-2.png" alt="Digifund"><span class="pdp-top__name">DIGIFUND</span></a>
        <div class="pdp-top__right">
            <a class="pdp-back" href="./index.html#products"><i class="fas fa-arrow-left"></i> <span id="tBack">Về trang chủ</span></a>
            <button class="pdp-toggle" id="langToggle" title="EN/VI">VI</button>
            <button class="pdp-toggle" id="themeToggle" title="Sáng/Tối"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <section class="pdp-hero">
        <div class="pdp-hero__wafer"></div>
        <p class="pdp-hero__crumb">
            <a href="./index.html" id="tHome">Trang chủ</a> ›
            <a href="./index.html#products" id="tAllProd">Tất cả sản phẩm</a> ›
            <span id="heroCrumb"></span>
        </p>
        <span class="pdp-hero__badge" id="heroBadge"></span>
        <h1 class="pdp-hero__title" id="heroTitle"></h1>
        <p class="pdp-hero__intro" id="heroIntro"></p>
    </section>

    <main class="pdp-main" id="pdpBody"></main>

    <footer class="pdp-foot">
        © 2026 Digifund. <a href="./index.html" id="tFootBack">Về trang chủ</a>
    </footer>

    <script src="./assets/js/products-data.js"></script>
    <script>
    (function () {
        var PD = window.PD_DATA || {};
        var STR = window.PD_STR || {};

        function getLang() { return localStorage.getItem('digifund-lang') || 'vi'; }
        function T(x) { return (x && typeof x === 'object') ? (x[getLang()] || x.vi || '') : (x || ''); }
        function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function param(name) {
            var m = new RegExp('[?&]' + name + '=([^&]*)').exec(location.search);
            return m ? decodeURIComponent(m[1]) : null;
        }
        var groupId = param('group') || '1';

        function renderVariant(v) {
            var specsHtml;
            if (v.specs && v.specs.length) {
                specsHtml = '<table class="pd-specs"><tbody>' + v.specs.map(function (s) {
                    return '<tr><th>' + esc(T(s.k)) + '</th><td>' + esc(T(s.v)) + '</td></tr>';
                }).join('') + '</tbody></table>';
            } else {
                specsHtml = '<div class="pd-empty">' + esc(T(STR.updating)) + '</div>';
            }
            var desc = T(v.desc);
            return '' +
                '<div class="pd-variant">' +
                    '<div class="pd-variant__bg" style="background-image:url(\'' + v.img + '\')"></div>' +
                    '<div class="pd-variant__body">' +
                        '<h3 class="pd-variant__name">' + esc(T(v.name)) + '</h3>' +
                        (desc ? '<p class="pd-variant__desc">' + esc(desc) + '</p>' : '') +
                        specsHtml +
                        '<a href="./index.html#contact" class="pd-variant__btn"><i class="fas fa-paper-plane"></i> ' + esc(T(STR.quote)) + '</a>' +
                    '</div>' +
                '</div>';
        }

        function render() {
            var lang = getLang();
            document.documentElement.lang = lang;
            document.getElementById('langToggle').textContent = lang === 'vi' ? 'VI' : 'EN';
            // static labels
            document.getElementById('tHome').textContent = T(STR.home);
            document.getElementById('tAllProd').textContent = T(STR.allprod);
            document.getElementById('tBack').textContent = T(STR.back);
            document.getElementById('tFootBack').textContent = T(STR.back);

            var g = PD[groupId];
            var body = document.getElementById('pdpBody');
            if (!g) {
                document.getElementById('heroTitle').textContent = T(STR.notfound);
                document.getElementById('heroIntro').textContent = '';
                document.getElementById('heroBadge').textContent = '';
                document.getElementById('heroCrumb').textContent = '—';
                body.innerHTML = '';
                return;
            }
            document.documentElement.style.setProperty('--accent', g.accent);
            document.getElementById('heroBadge').textContent = T(g.badge);
            document.getElementById('heroTitle').textContent = T(g.title);
            document.getElementById('heroIntro').textContent = T(STR.intro);
            document.getElementById('heroCrumb').textContent = T(g.badge);
            document.title = T(g.title) + ' - Digifund';

            body.innerHTML = g.items.map(function (it, idx) {
                return '' +
                    '<div class="pd-item">' +
                        '<div class="pd-item__head">' +
                            '<span class="pd-item__no">' + (idx + 1) + '</span>' +
                            '<h2 class="pd-item__name">' + esc(T(it.name)) + '</h2>' +
                        '</div>' +
                        '<div class="pd-variants">' + (it.variants || []).map(renderVariant).join('') + '</div>' +
                    '</div>';
            }).join('');
        }

        // Theme
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('themeToggle').innerHTML = t === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('digifund-theme', t);
        }
        var theme = localStorage.getItem('digifund-theme') || 'light';
        applyTheme(theme);

        document.getElementById('langToggle').addEventListener('click', function () {
            var l = getLang() === 'vi' ? 'en' : 'vi';
            localStorage.setItem('digifund-lang', l);
            render();
        });
        document.getElementById('themeToggle').addEventListener('click', function () {
            theme = theme === 'dark' ? 'light' : 'dark';
            applyTheme(theme);
        });

        render();
    })();
    </script>
</body>
</html>
